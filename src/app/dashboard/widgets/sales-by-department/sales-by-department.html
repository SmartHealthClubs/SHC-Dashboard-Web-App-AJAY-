<div class="flex min-w-72 flex-1 flex-col gap-4 rounded-2xl border border-border bg-white p-5">
  <div class="flex items-start justify-between gap-3">
    <p class="text-sm text-text-secondary">Sales by department</p>
    <p class="font-heading text-lg font-semibold text-brand-navy">{{ formatCurrency(total()) }}</p>
  </div>

  @if (rows().length === 0) {
    <p class="text-sm text-text-secondary">No sales data for this scope.</p>
  } @else {
    <div [style.height]="chartHeight()">
      <p-chart type="bar" [data]="chartData()" [options]="chartOptions" [plugins]="HORIZONTAL_BAR_PLUGINS" />
    </div>

    <div class="flex flex-col gap-1.5 border-t border-border pt-3">
      @for (row of rows(); track row.department) {
        <div class="flex flex-wrap items-center gap-x-3 gap-y-0.5 text-xs text-text-secondary">
          <span
            class="cursor-default font-medium text-brand-navy"
            [pTooltip]="paymentMethodTooltip(row)"
            [escape]="false"
          >
            {{ row.department }}
          </span>
          <span>Member {{ formatCurrency(row.memberTotal) }}</span>
          <span>Non-member {{ formatCurrency(row.nonMemberTotal) }}</span>
        </div>
      }
    </div>
  }

  <app-report-link label="View full Sales by Department report" />
</div>
