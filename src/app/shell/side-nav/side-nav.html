<nav class="hidden w-56 shrink-0 flex-col gap-1 border-r border-border bg-white px-3 py-6 md:flex">
  @for (item of items; track item.label) {
    <div
      class="flex items-center gap-3 rounded-full px-3.5 py-2 text-sm font-medium"
      [class.bg-brand-blue]="item.active"
      [class.text-white]="item.active"
      [class.text-text-secondary]="!item.active"
      [class.cursor-default]="!item.active"
    >
      <lucide-icon [img]="item.icon" class="size-4.5"></lucide-icon>
      {{ item.label }}
    </div>
  }
</nav>
